version: '3.8'

services:
  # СЕРВИС 1: Приложение (FastAPI)
  api:
    build: .
    container_name: cache-api-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://appuser:apppassword@db:5432/cachedb
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=60
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app  # ✅ ВАЖНО: Монтируем текущую папку в /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 3s
      retries: 3

  # СЕРВИС 2: Redis (Кэш)
  redis:
    image: redis:7-alpine
    container_name: cache-api-redis
    volumes:
      - redis_data:/data  # ✅ Правильный том для Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  # СЕРВИС 3: База данных
  db:
    image: postgres:15-alpine
    container_name: cache-api-db
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=cachedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d cachedb"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redis_data: